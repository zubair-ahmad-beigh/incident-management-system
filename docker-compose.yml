version: "3.9"

services:

  # ──────────────────────────────────────────────
  #  MySQL 8.0 (source of truth)
  # ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ims-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      imsdb
      MYSQL_USER:          imsuser
      MYSQL_PASSWORD:      imspassword
    ports:
      - "3307:3306"   # 3306 already taken by local MySQL — exposed on 3307
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --explicit_defaults_for_timestamp=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "imsuser", "--password=imspassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  #  MongoDB (raw signals store)
  # ──────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: ims-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: imsdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  #  Redis (cache layer)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ims-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  #  Zookeeper (required by Kafka)
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ims-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ──────────────────────────────────────────────
  #  Kafka broker
  # ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ims-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "9101:9101"       # JMX (optional metrics)
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_MESSAGE_MAX_BYTES:                10485760   # 10MB
      KAFKA_JMX_PORT:                         9101
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  #  Kafka UI (developer convenience)
  # ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ims-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:            local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER:       zookeeper:2181

  # ──────────────────────────────────────────────
  #  IMS Backend (Spring Boot)
  # ──────────────────────────────────────────────
  ims-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST:     mysql
      MYSQL_PORT:     3306
      MYSQL_DB:       imsdb
      MYSQL_USER:     imsuser
      MYSQL_PASSWORD: imspassword
      MONGO_HOST:        mongo
      MONGO_PORT:        27017
      MONGO_DB:          imsdb
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

networks:
  default:
    name: ims-network
